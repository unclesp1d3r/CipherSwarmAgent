name: Go
on:
  push:
    branches: ["main"]
  pull_request:
permissions:
  contents: read
jobs:
  build:
    strategy:
      matrix:
        go: [stable]
        os: [ubuntu-latest, macos-latest, windows-latest]
    name: Build and test
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
        with:
          install: true
          cache: true
          github_token: ${{ secrets.GITHUB_TOKEN }}
      # Go is provided by mise (idiomatic version file -> go.mod), the single source
      # of truth for tool versions. A separate actions/setup-go install would put a
      # second, different Go on PATH and cause a compiler/tool version mismatch.
      - name: Build
        run: go build -v ./...

      - name: Test
        run: go test -v ./...
  race:
    name: Race detector
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
        with:
          install: true
          cache: true
          github_token: ${{ secrets.GITHUB_TOKEN }}
      - name: Test with race detector
        timeout-minutes: 15
        run: go test -race -v ./...
  golangci:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
        with:
          install: true
          cache: true
          github_token: ${{ secrets.GITHUB_TOKEN }}
      # Run golangci-lint via mise so the version stays pinned to mise.toml (the
      # single source of truth). The golangci-lint-action with version:latest drifts
      # to newer releases that flag rules the pinned version does not.
      - name: golangci-lint
        run: mise x -- golangci-lint run ./...
  coverage:
    name: Test Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
        with:
          install: true
          cache: true
          github_token: ${{ secrets.GITHUB_TOKEN }}
      - name: Run coverage
        timeout-minutes: 10
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...
      - name: Upload coverage to Codecov
        if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
        uses: codecov/codecov-action@v7
        with:
          files: ./coverage.out
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
